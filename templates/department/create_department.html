{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-6 col-md-8">
 
  <div class="text-center mb-4">
    <div class="auth-icon green"><i class="bi bi-building-add"></i></div>
    <h2 class="auth-title">Create New Department</h2>
    <p class="auth-subtitle">Add a department to your company</p>
  </div>
 
  <div class="auth-card">
    <form method="POST">
      {% csrf_token %}
 
      <div class="mb-3">
        <label class="auth-label">Department Name</label>
        <div class="input-group">
          <span class="input-group-text auth-input-icon"><i class="bi bi-building"></i></span>
          <input type="text" name="name" class="form-control"
                 placeholder="e.g. Marketing, HR, Finance" required
                 value="{{ form.name.value|default:'' }}">
        </div>
      </div>
 
      <div class="mb-3">
        <label class="auth-label">Description <span style="color:#94a3b8;font-weight:400;">(optional)</span></label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="What does this department do?">{{ form.description.value|default:'' }}</textarea>
      </div>
 
      <div class="mb-4">
        <label class="auth-label">Initial Monthly Budget (BDT)</label>
        <div class="input-group">
          <span class="input-group-text auth-input-icon" style="font-weight:800;">৳</span>
          <input type="number" name="monthly_budget" class="form-control"
                 placeholder="e.g. 100000" step="0.01" min="0" required
                 value="{{ form.monthly_budget.value|default:'' }}">
        </div>
      </div>
 
      {% if form.errors %}
      <div class="alert alert-danger mb-3" style="font-size:0.88rem;border-radius:10px;">{{ form.errors }}</div>
      {% endif %}
 
      <button type="submit" class="auth-btn auth-btn-green">
        <i class="bi bi-check-circle-fill"></i> Create Department
      </button>
    </form>
 
    <p class="auth-bottom-link mt-3">
      <a href="{% url 'department:head_dashboard' %}" class="blue">
        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
      </a>
    </p>
  </div>
 
</div>
</div>
</div>
</section>
{% endblock %}
