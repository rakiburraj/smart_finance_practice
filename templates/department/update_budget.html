{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
<div class="container">
<div class="row justify-content-center">
<div class="col-lg-5 col-md-7">
 
  <div class="text-center mb-4">
    <div style="width:60px;height:60px;border-radius:16px;background:#fef9c3;
                display:flex;align-items:center;justify-content:center;
                margin:0 auto 16px;font-size:1.6rem;color:#ca8a04;">
      <i class="bi bi-wallet2"></i>
    </div>
    <h2 class="auth-title">Update Budget</h2>
    <p class="auth-subtitle">Department: <strong>{{ dept.name }}</strong></p>
  </div>
 
  <div class="auth-card">
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;
                padding:14px;margin-bottom:24px;">
      <p style="font-size:0.82rem;color:#64748b;margin:0;">
        Current budget: <strong style="color:#0f172a;">৳{{ dept.monthly_budget }}</strong>
        {% if dept.carried_over > 0 %}
        + <strong style="color:#16a34a;">৳{{ dept.carried_over }}</strong> carried over
        {% endif %}
      </p>
    </div>
 
    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label class="auth-label">New Monthly Budget (BDT)</label>
        <div class="input-group">
          <span class="input-group-text auth-input-icon" style="font-weight:800;">৳</span>
          <input type="number" name="monthly_budget" class="form-control"
                 value="{{ form.monthly_budget.value|default:dept.monthly_budget }}"
                 step="0.01" min="0" style="font-size:1.1rem;font-weight:600;" required>
        </div>
      </div>
 
      <button type="submit" class="auth-btn"
              style="background:#ca8a04;color:white;width:100%;padding:13px;
                     border-radius:10px;font-size:1rem;font-weight:600;
                     border:none;cursor:pointer;display:flex;align-items:center;
                     justify-content:center;gap:8px;">
        <i class="bi bi-check-circle-fill"></i> Update Budget
      </button>
    </form>
 
    <p class="auth-bottom-link mt-3">
      <a href="{% url 'department:head_dashboard' %}" class="blue">
        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
      </a>
    </p>
  </div>
 
</div>
</div>
</div>
</section>
{% endblock %}
