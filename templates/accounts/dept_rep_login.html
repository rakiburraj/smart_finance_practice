{% extends 'base.html' %}
{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-4 col-md-6">

        <div class="text-center mb-4">
          <div class="auth-icon green">
            <i class="bi bi-person-badge-fill"></i>
          </div>
          <h2 class="auth-title">Department Rep Login</h2>
          <p class="auth-subtitle">Login with your email and password</p>
        </div>

        <div class="auth-card">

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}

            <!-- EMAIL -->
            <div class="mb-3">
              <label class="auth-label">Email</label>
              <div class="input-group">
                <span class="input-group-text auth-input-icon">
                  <i class="bi bi-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control"
                       placeholder="rep@company.com" required>
              </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">
              <label class="auth-label">Password</label>
              <div class="input-group">
                <span class="input-group-text auth-input-icon">
                  <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" id="pass"
                       class="form-control" placeholder="Your password" required>

                <button class="btn pass-toggle" type="button"
                        onclick="togglePass('pass','eye')">
                  <i class="bi bi-eye" id="eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="auth-btn auth-btn-green">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

          </form>

        </div>

        <div class="auth-other-links">
          Other logins:
          <a href="{% url 'accounts:individual_login' %}">Individual</a> |
          <a href="{% url 'accounts:finance_head_login' %}">Finance Head</a>
        </div>

      </div>
    </div>
  </div>
</section>

<script>
function togglePass(i,e){
  const a=document.getElementById(i),b=document.getElementById(e);
  if(a.type==='password'){
    a.type='text';
    b.classList.replace('bi-eye','bi-eye-slash');
  }else{
    a.type='password';
    b.classList.replace('bi-eye-slash','bi-eye');
  }
}
</script>

{% endblock %}
